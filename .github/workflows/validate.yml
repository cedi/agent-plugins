name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the exact tool versions pinned in .mise.toml, so CI and local
      # dev run the same toolchain.
      - uses: jdx/mise-action@v2

      - name: Validate marketplace, plugins, and skills
        run: mise run validate
